services:
  nowledge-mem-snap:
    image: czyt/nowledge-mem-snap:latest
    container_name: nowledge-mem-snap
    restart: unless-stopped
    env_file:
      - example.env
    ports:
      - "14335:14335"
    volumes:
      - snap-data:/app/data
      # Optional operator-level directory snapshot sources for Nowledge Mem Docker:
      # - ./data:/mem-data:ro
      # - ./config:/mem-config:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:14335/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: nowledge-mem-snap-postgres
    profiles:
      - postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nowledge_mem_snap
      POSTGRES_USER: nowledge_mem_snap
      POSTGRES_PASSWORD: nowledge_mem_snap_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nowledge_mem_snap -d nowledge_mem_snap"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - snap-postgres:/var/lib/postgresql/data

  mysql:
    image: mysql:8.4
    container_name: nowledge-mem-snap-mysql
    profiles:
      - mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nowledge_mem_snap
      MYSQL_USER: nowledge_mem_snap
      MYSQL_PASSWORD: nowledge_mem_snap_password
      MYSQL_ROOT_PASSWORD: nowledge_mem_snap_root_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-unowledge_mem_snap", "-pnowledge_mem_snap_password"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - snap-mysql:/var/lib/mysql

volumes:
  snap-data:
  snap-postgres:
  snap-mysql:
