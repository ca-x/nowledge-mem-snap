name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        run: npm --prefix web ci
      - name: Build embedded web UI
        run: npm --prefix web run build
      - name: Generate ent code
        run: go generate ./internal/persist/ent
      - name: Check generated ent code
        run: git diff --exit-code -- go.mod go.sum internal/persist/ent
      - name: Run Go tests
        run: go test ./...
      - name: Build Go packages
        run: go build -trimpath ./...
