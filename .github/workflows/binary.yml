name: Binary Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-web:
    name: Build embedded web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        run: npm --prefix web ci
      - name: Build web UI
        run: npm --prefix web run build
      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body: |
            ## Downloads

            Download the archive for your platform, extract it, and run `nowledge-mem-snap`.

            Docker images are published separately by the Docker Build and Push workflow.

  build-binary:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs:
      - build-web
      - create-github-release
    if: ${{ always() && needs.build-web.result == 'success' && (needs.create-github-release.result == 'success' || needs.create-github-release.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            goos: linux
            goarch: amd64
            exe: nowledge-mem-snap
            archive: tar.gz
          - platform: linux-arm64
            goos: linux
            goarch: arm64
            exe: nowledge-mem-snap
            archive: tar.gz
          - platform: linux-armv7
            goos: linux
            goarch: arm
            goarm: "7"
            exe: nowledge-mem-snap
            archive: tar.gz
          - platform: linux-armv6
            goos: linux
            goarch: arm
            goarm: "6"
            exe: nowledge-mem-snap
            archive: tar.gz
          - platform: windows-amd64
            goos: windows
            goarch: amd64
            exe: nowledge-mem-snap.exe
            archive: zip
          - platform: darwin-amd64
            goos: darwin
            goarch: amd64
            exe: nowledge-mem-snap
            archive: tar.gz
          - platform: darwin-arm64
            goos: darwin
            goarch: arm64
            exe: nowledge-mem-snap
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: Verify generated ent code
        run: |
          go generate ./internal/persist/ent
          git diff --exit-code -- go.mod go.sum internal/persist/ent
      - name: Set build metadata
        id: meta
        run: echo "build_time=$(date -u '+%Y-%m-%d_%H:%M:%S_UTC')" >> "$GITHUB_OUTPUT"
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          test -f web/dist/index.html
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w \
              -X 'github.com/lib-x/nowledge-mem-snap/version.Version=${{ github.ref_name }}' \
              -X 'github.com/lib-x/nowledge-mem-snap/version.BuildTime=${{ steps.meta.outputs.build_time }}' \
              -X 'github.com/lib-x/nowledge-mem-snap/version.GitCommit=${{ github.sha }}'" \
            -o dist/${{ matrix.exe }} .
      - name: Create archive
        run: |
          cd dist
          base="nowledge-mem-snap-${{ github.ref_name }}-${{ matrix.platform }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip "${base}.zip" "${{ matrix.exe }}"
          else
            tar czf "${base}.tar.gz" "${{ matrix.exe }}"
          fi
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nowledge-mem-snap-${{ matrix.platform }}
          path: dist/nowledge-mem-snap-${{ github.ref_name }}-${{ matrix.platform }}.*
          retention-days: 14
      - name: Upload archive to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: dist/nowledge-mem-snap-${{ github.ref_name }}-${{ matrix.platform }}.*
